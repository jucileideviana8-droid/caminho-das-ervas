<div class="overlay">
  <div class="modal">
    <!-- Botão de fechar que emite o evento para o app.ts -->
    <button class="close-btn" (click)="irParaLogin($event)">×</button>

    <h2>Criar Conta</h2>

    <form (submit)="registrarUsuario()">
      <label for="nome">Nome Completo</label>
      <input type="text" id="nome" name="nome" placeholder="Seu nome" required>

      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="seu@email.com" required>

      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" placeholder="******" required>

      <button type="submit">Finalizar Cadastro</button>

      <div class="alternativas">
  <!-- Use o evento (click) em vez de routerLink para manter a sobreposição do modal -->
        <a href="#" (click)="irParaLogin($event)">Voltar para o Login</a>
      </div>
    </form>
  </div>
</div>
