<section class="hero">
    <h1>Produtos artesanais. Natureza sustentável</h1>
    <p>Direto da nossa produção para o seu ritual de autocuidado. Usando ciência e bem estar para o seu dia a dia</p>
</section>

<section class="container">
    <div class="product-grid">
        @for (produto of produtosFiltrados; track produto.id) {
            <app-produto [produto]="produto"></app-produto>
        } @empty {
        <h1>Nenhum produto encontrado.</h1>
        }
    </div>
</section>
